services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contract-ai-postgres
    environment:
      POSTGRES_DB: contract_ai
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    command: ["postgres", "-c", "max_connections=300"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Port NOT exposed to host in production — backend accesses via internal network
    # Uncomment for local development/debugging:
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_user -d contract_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - contract-ai-network
    restart: always

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: contract-ai-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - contract-ai-network
    restart: always

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contract-ai-backend
    environment:
      - DATABASE_URL=postgresql://contract_user:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/contract_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=contract_user
      - APP_ENV=${APP_ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - YANDEX_API_KEY=${YANDEX_API_KEY:-}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:7b}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-deepseek}
      - NGROK_URL=${NGROK_URL:-}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-}
      - SEED_LAWYER_PASSWORD=${SEED_LAWYER_PASSWORD:-}
      - SEED_VIP_PASSWORD=${SEED_VIP_PASSWORD:-}
      - SEED_DEMO_PASSWORD=${SEED_DEMO_PASSWORD:-}
      - FORCE_RESEED=${FORCE_RESEED:-false}
      - BRIDGE_SECRET=${BRIDGE_SECRET:-}
      # Prevent HuggingFace Hub downloads at startup — models must be pre-cached.
      # Remove this flag only if you have a pre-warmed HF cache volume.
      - HF_HUB_OFFLINE=1
    volumes:
      - ./data:/app/data
      - ./chroma_data:/app/chroma_data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - contract-ai-network
    restart: always

  # Streamlit Admin UI
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contract-ai-streamlit
    command: ["streamlit", "run", "admin/streamlit_dashboard.py", "--server.port=8502", "--server.address=0.0.0.0", "--server.baseUrlPath=streamlit-admin", "--server.enableXsrfProtection=true", "--server.enableCORS=false"]
    environment:
      - DATABASE_URL=postgresql://contract_user:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/contract_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      - APP_ENV=${APP_ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-deepseek}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-}
      - SEED_LAWYER_PASSWORD=${SEED_LAWYER_PASSWORD:-}
      - SEED_VIP_PASSWORD=${SEED_VIP_PASSWORD:-}
      - SEED_DEMO_PASSWORD=${SEED_DEMO_PASSWORD:-}
    volumes:
      - ./data:/app/data
      - ./chroma_data:/app/chroma_data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8502/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - contract-ai-network
    restart: always

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: ""
    container_name: contract-ai-frontend
    environment:
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_WS_URL=
    depends_on:
      backend:
        condition: service_healthy
    # Override Dockerfile HEALTHCHECK: Alpine wget resolves 'localhost' to [::1]
    # but Next.js listens on IPv4 0.0.0.0 only — use 127.0.0.1 explicitly.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - contract-ai-network
    restart: always

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: contract-ai-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    depends_on:
      - frontend
      - backend
      - streamlit
    networks:
      - contract-ai-network
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  contract-ai-network:
    driver: bridge
