name: Contract AI CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-ai-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  APP_ENV: testing
  SECRET_KEY: ci-secret-key
  JWT_SECRET_KEY: ci-jwt-secret-key
  DATABASE_URL: sqlite:///./test_ci.db
  REDIS_URL: redis://localhost:6379/0
  DEFAULT_LLM_PROVIDER: mock
  OPENAI_API_KEY: test
  ANTHROPIC_API_KEY: test
  DEEPSEEK_API_KEY: test
  QWEN_API_KEY: test
  PERPLEXITY_API_KEY: test
  YANDEX_API_KEY: test
  YANDEX_FOLDER_ID: test
  STRIPE_SECRET_KEY: sk_test_ci
  BRIDGE_SECRET: ci-bridge-secret

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libmagic1 poppler-utils tesseract-ocr tesseract-ocr-rus

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall -q src

      - name: Run backend tests
        run: |
          pytest tests -q --tb=short \
            -m "not slow and not integration" \
            -k "not openai and not anthropic and not deepseek and not local_llm and not llm_gateway and not system_integration and not full_workflow"

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/ws
        run: npm run build

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --pull -t contract-ai-backend:ci .

      - name: Build frontend image
        run: docker build --pull -t contract-ai-frontend:ci ./frontend
