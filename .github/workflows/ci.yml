name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Backend: lint + test
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 --ignore=E501,W503,E402 --count --show-source --statistics

      - name: Run tests with coverage
        env:
          SECRET_KEY: test-secret-key-for-ci
          APP_ENV: testing
          DATABASE_URL: sqlite:///./test_ci.db
        run: |
          pip install pytest-cov
          pytest tests/ -v --tb=short -q \
            -k "not llm and not openai and not deepseek and not anthropic" \
            --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # Frontend: lint + build
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/ws
        run: npm run build

  # Security scan
  security:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit security scan
        run: bandit -r src/ -ll -ii --format json -o bandit-report.json || true

      - name: Bandit summary
        run: bandit -r src/ -ll -ii --format screen || true

      - name: Safety dependency check
        run: safety check -r requirements.txt --output json > safety-report.json || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # Docker build check
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t contract-ai-backend .

      - name: Build frontend image
        run: docker build -t contract-ai-frontend ./frontend
